<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Royal Guard | Verified</title>

    body { background:#0b0b0d; color:#fff; font-family: 'Segoe UI', Arial, sans-serif;
           display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    .card { background:#1a1a1d; border:1px solid #2b2b2f; border-radius:16px; padding:48px;
            text-align:center; max-width:420px; }
    h1 { color:#57A05A; margin-bottom:8px; }
    p { color:#c7c7c9; }
    .username { color:#fff; font-weight:600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>✅ Verified</h1>
    <p>Your Roblox account <span class="username">{{ roblox_username }}</span> has been linked.</p>

  </div>
</body>
</html>
